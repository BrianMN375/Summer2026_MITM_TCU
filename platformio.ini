; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
globallib_dir = /Users/brianmay/Dropbox/Electronics Dev Library and Docs/A1 - Firmware Development/libraries


[env:TFT_Development_GenericCANTxRx]
platform = teensy
board = teensy41
framework = arduino
board_build.f_cpu = 600000000
custom_secure_key = ~/Documents/Arduino/key.pem
; monitor_speed = 115200
; monitor_filters = time
	; log2file
monitor_filters = send_on_enter

build_flags =
    -D ARDUINO_TEENSY41
    -D FLEXCAN_T4
    -D BUILTIN_SDCARD=254
    -Wno-class-memaccess
  -D ARDUINO=10805
    ; -D USE_BUILTIN_SDCARD


lib_extra_dirs = lib

lib_deps =  
	br3ttb/PID@^1.2.1
	powerbroker2/ArduPID@^0.2.1
	denyssene/SimpleKalmanFilter@^0.1.0
	jonniezg/EWMA@^1.0.2
	nitrofmtl/ACI_10K_AN-temp-sensor@^1.0
 	; arduino-libraries/FlexCAN_T4@^1.2.0
 	; paulstoffregen/Fifo@^1.0.3
    ; paulstoffregen/FlexCAN_T4



[env:env1]
build_flags = USB_SERIAL


